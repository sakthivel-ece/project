<!DOCTYPE html>
<html>
<head>
  <title>Student Registration Form</title>
</head>
<body>

  <h2>Student Registration Form</h2>

  <form action="/submit" method="post">
    
    <!-- Name Details -->
    First name: <input type="text" name="firstname"><br><br>
    Middle name: <input type="text" name="middlename"><br><br>
    Last name: <input type="text" name="lastname"><br><br>

    <!-- Course -->
    Course: <input type="text" name="course"><br><br>

    <!-- Gender -->
    Gender:<br>
    <input type="radio" name="gender" value="male"> Male<br>
    <input type="radio" name="gender" value="female"> Female<br>
    <input type="radio" name="gender" value="other"> Other<br><br>

    <!-- Phone -->
    Phone: <input type="text" name="phone" placeholder="Phone number"> <br><br>

    <!-- Address -->
    Address: <input type="text" name="address"><br><br>

    <!-- Email -->
    Email: <input type="email" name="email"><br><br>

    <!-- Password -->
    Password: <input type="password" name="password"><br><br>
    Re-type Password: <input type="password" name="repassword"><br><br>

    <!-- Buttons -->
    <div style="display: flex; justify-content: space-between; width: 250px;">
      <a href="login.html">
        <button type="button">Login</button>
      </a>
      <input type="submit" value="Submit">
    </div>

  </form>

</body>
</html>
